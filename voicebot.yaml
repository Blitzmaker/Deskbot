substitutions:
  name: waveshare-voice-satellite
  friendly_name: "Waveshare Voice Satellite"
  idle_phase: "Bereit"
  listening_phase: "Ich hoere zu"
  thinking_phase: "Ich denke nach"
  replying_phase: "Ich antworte"
  not_ready_phase: "Nicht bereit"
  muted_phase: "Mikrofon stumm"
  error_phase: "Fehler"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: deskbot.voice_satellite
    version: "2.0"
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    priority: 600
    then:
      - switch.turn_on: speaker_enable
      - text_sensor.template.publish:
          id: va_state
          state: "${not_ready_phase}"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name}"
    password: !secret wifi_password

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/shelson/esphome-cst9217

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 20
  - file: "gfonts://Roboto"
    id: font_medium
    size: 28

color:
  - id: color_bg
    hex: "000000"
  - id: color_ready
    hex: 1EDC7A
  - id: color_listening
    hex: 25D0FF
  - id: color_thinking
    hex: D96CFF
  - id: color_replying
    hex: F8D34B
  - id: color_muted
    hex: FF9C2A
  - id: color_error
    hex: FF4D67
  - id: color_text
    hex: F4F7FF

globals:
  - id: use_wake_word_forced_off
    type: bool
    restore_value: false
    initial_value: "false"

text_sensor:
  - platform: template
    name: "Status"
    id: va_state
    update_interval: never
    on_value:
      - component.update: status_display

switch:
  - platform: template
    name: "Use Wake Word"
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:account-voice
    turn_on_action:
      - lambda: id(va).set_use_wake_word(true);
      - if:
          condition:
            api.connected:
          then:
            - voice_assistant.start_continuous
            - text_sensor.template.publish:
                id: va_state
                state: "${idle_phase}"
    turn_off_action:
      - lambda: id(va).set_use_wake_word(false);
      - voice_assistant.stop
      - text_sensor.template.publish:
          id: va_state
          state: "${muted_phase}"

  - platform: gpio
    id: speaker_enable
    pin: GPIO46
    restore_mode: RESTORE_DEFAULT_ON
    internal: true

number:
  - platform: template
    name: "Speaker Volume"
    id: speaker_volume
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - lambda: |-
          id(va).set_volume_multiplier(x / 100.0f * 2.0f);
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    optimistic: true
    restore_value: true
    initial_value: 80
    min_value: 10
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - light.control:
          id: display_backlight
          brightness: !lambda return x / 100.0f;

button:
  - platform: template
    name: "Start Listening"
    icon: mdi:microphone
    on_press:
      then:
        - script.execute: start_listening
  - platform: template
    name: "Stop Listening"
    icon: mdi:microphone-off
    on_press:
      then:
        - voice_assistant.stop
        - script.execute: stop_listening

i2c:
  - id: bus_a
    sda: GPIO15
    scl: GPIO14
    scan: true

i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin:
      number: GPIO45
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO9
      allow_other_uses: true
    i2s_mclk_pin: GPIO42
  - id: i2s_in
    i2s_lrclk_pin:
      number: GPIO45
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO9
      allow_other_uses: true

audio_adc:
  - platform: es7210
    id: adc_bus_a
    sample_rate: 16000
    bits_per_sample: 16bit

audio_dac:
  - platform: es8311
    id: dac_bus_a
    sample_rate: 16000
    bits_per_sample: 16bit

microphone:
  - platform: i2s_audio
    id: external_microphone
    i2s_audio_id: i2s_in
    adc_type: external
    i2s_din_pin: GPIO10
    sample_rate: 16000
    bits_per_sample: 16bit
    pdm: false

speaker:
  - platform: i2s_audio
    id: external_speaker
    i2s_audio_id: i2s_out
    audio_dac: dac_bus_a
    dac_type: external
    i2s_dout_pin: GPIO8
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    timeout: never
    buffer_duration: 100ms

voice_assistant:
  id: va
  microphone: external_microphone
  speaker: external_speaker
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 1.2
  on_start:
    - text_sensor.template.publish:
        id: va_state
        state: "${listening_phase}"
  on_listening:
    - text_sensor.template.publish:
        id: va_state
        state: "${listening_phase}"
  on_stt_vad_end:
    - text_sensor.template.publish:
        id: va_state
        state: "${thinking_phase}"
  on_tts_stream_start:
    - text_sensor.template.publish:
        id: va_state
        state: "${replying_phase}"
  on_tts_stream_end:
    - script.execute: stop_listening
  on_end:
    - script.execute: stop_listening
  on_error:
    - text_sensor.template.publish:
        id: va_state
        state: "${error_phase}"
  on_client_connected:
    - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - voice_assistant.start_continuous
          - text_sensor.template.publish:
              id: va_state
              state: "${idle_phase}"
        else:
          - text_sensor.template.publish:
              id: va_state
              state: "${muted_phase}"
  on_client_disconnected:
    - text_sensor.template.publish:
        id: va_state
        state: "${not_ready_phase}"

script:
  - id: start_listening
    then:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - switch.turn_off: use_wake_word
            - wait_until:
                not:
                  voice_assistant.is_running
            - lambda: id(use_wake_word_forced_off) = true;
      - text_sensor.template.publish:
          id: va_state
          state: "${listening_phase}"
      - voice_assistant.start

  - id: stop_listening
    then:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - text_sensor.template.publish:
                id: va_state
                state: "${idle_phase}"
          else:
            - if:
                condition:
                  lambda: return id(use_wake_word_forced_off);
                then:
                  - lambda: id(use_wake_word_forced_off) = false;
                  - switch.turn_on: use_wake_word
                else:
                  - text_sensor.template.publish:
                      id: va_state
                      state: "${muted_phase}"

spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO38
    data_pins: [GPIO4, GPIO5, GPIO6, GPIO7]

display:
  - platform: mipi_spi
    id: status_display
    # CO5300 support is available in current ESPHome docs for this Waveshare board.
    model: CO5300
    bus_mode: quad
    cs_pin: GPIO12
    reset_pin: GPIO39
    dimensions:
      width: 466
      height: 466
    update_interval: 250ms
    lambda: |-
      auto current = id(va_state).state;
      Color accent = id(color_ready);
      if (current == "${listening_phase}") {
        accent = id(color_listening);
      } else if (current == "${thinking_phase}") {
        accent = id(color_thinking);
      } else if (current == "${replying_phase}") {
        accent = id(color_replying);
      } else if (current == "${muted_phase}") {
        accent = id(color_muted);
      } else if (current == "${error_phase}" || current == "${not_ready_phase}") {
        accent = id(color_error);
      }

      it.fill(id(color_bg));
      it.filled_circle(233, 140, 72, accent);
      it.circle(233, 140, 88, id(color_text));
      it.printf(233, 270, id(font_medium), id(color_text), TextAlign::CENTER, "${friendly_name}");
      it.printf(233, 315, id(font_medium), accent, TextAlign::CENTER, "%s", current.c_str());
      if (id(use_wake_word).state) {
        it.printf(233, 370, id(font_small), id(color_text), TextAlign::CENTER, "Wake word aktiv");
      } else {
        it.printf(233, 370, id(font_small), id(color_text), TextAlign::CENTER, "Push-to-talk per Home Assistant");
      }
      it.printf(233, 402, id(font_small), id(color_text), TextAlign::CENTER, "Lautstaerke %.0f%%", id(speaker_volume).state);

output:
  - platform: template
    id: backlight_brightness
    type: float
    write_action:
      - lambda: id(status_display).set_brightness(state * 255.0f);

light:
  - platform: monochromatic
    id: display_backlight
    name: "Display Brightness"
    output: backlight_brightness
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    initial_state:
      brightness: 80%

touchscreen:
  - platform: cst9217
    id: ts_display
    display: status_display
    interrupt_pin: GPIO11
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true
    on_update:
      - lambda: |-
          for (auto touch : touches) {
            if (touch.state <= 2) {
              ESP_LOGD("touch", "id=%d x=%d y=%d", touch.id, touch.x, touch.y);
            }
          }
