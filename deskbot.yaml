sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    accuracy_decimals: 2
    update_interval: 10s
    unit_of_measurement: "V"
    icon: mdi:battery-medium
    filters:
      - multiply: 2.0
      - median:
          window_size: 7
          send_every: 7
          send_first_at: 1
      - throttle: 1min
    on_value:
      then:
        - sensor.template.publish:
            id: battery_percentage
            state: !lambda 'return x;'
  # Hardware pack provides the ADC that publishes into this template
  - platform: template
    id: battery_percentage
    name: "Battery Percentage"
    update_interval: never
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:battery-medium
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 2.80 -> 0.0
            - 3.10 -> 10.0
            - 3.30 -> 20.0
            - 3.45 -> 30.0
            - 3.60 -> 40.0
            - 3.70 -> 50.0
            - 3.75 -> 60.0
            - 3.80 -> 70.0
            - 3.90 -> 80.0
            - 4.00 -> 90.0
            - 4.20 -> 100.0
      - lambda: |-
          if (x > 100) return 100;
          if (x < 0) return 0;
          return x;
    on_value:
      then:
        - lambda: |-
            int current = (int) x;
            if (current == id(last_battery_percent)) return;
            id(last_battery_percent) = current;
        - if:
            condition:
              switch.is_on: show_battery_status
            then:
              - component.update: main_display

binary_sensor:
  - platform: template
    name: "Touch Button"
    id: touch_input
    on_click:
      min_length: 30ms
      max_length: 600ms
      then:
        - if:
            condition:
              switch.is_on: timer_ringing
            then:
              - switch.turn_off: timer_ringing
            else:
              - if:
                  condition:
                    lambda: return id(wake_word_engine_location).current_option() == "On device";
                  then:
                    - media_player.stop:
                        id: external_media_player
                    - if:
                        condition:
                          not:
                            voice_assistant.is_running:
                        then:
                          - voice_assistant.start:
                        else:
                          - voice_assistant.stop:

  - platform: gpio
    pin:
      number: 0
      mode: INPUT_PULLUP
#      ignore_strapping_warning: true
      inverted: true
    id: left_button
    on_multi_click:
      - timing:
          - ON for 40ms to 400ms
          - OFF for at least 330ms
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      lambda: return id(wake_word_engine_location).current_option() == "On device";
                    then:
                      - media_player.stop:
                          id: external_media_player
                      - if:
                          condition:
                            not:
                              voice_assistant.is_running:
                          then:
                            - voice_assistant.start:
                          else:
                            - voice_assistant.stop:
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: show_battery_status
          - component.update: main_display

  - platform: template
    name: "Timer Ringing Active"
    id: timer_ringing_active
    device_class: sound
    lambda: |-
      return id(timer_ringing).state;

  - platform: template
    id: swipe_left
    name: "Swipe Left"
    device_class: moving
    entity_category: diagnostic

  - platform: template
    id: swipe_right
    name: "Swipe Right"
    device_class: moving
    entity_category: diagnostic
    
  - platform: template
    id: swipe_up
    name: "Swipe Up"
    device_class: moving
    entity_category: diagnostic
    
  - platform: template
    id: swipe_down
    name: "Swipe Down"
    device_class: moving
    entity_category: diagnostic

micro_wake_word:
  id: mww
  models:
    - okay_nabu
    - hey_jarvis
  on_wake_word_detected:
    - script.execute: reset_screensaver
    - if:
        condition:
          switch.is_on: wake_sound
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(wake_word_triggered_sound);
          - delay: 300ms
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  media_player: external_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_listening:
    - script.execute: reset_screensaver
    - script.execute:
        id: set_phase
        phase: ${voice_assist_waiting_for_command_phase_id}
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display

  on_stt_vad_start:
    - script.execute:
        id: set_phase
        phase: ${voice_assist_listening_phase_id}

  on_stt_vad_end:
    - script.execute:
        id: set_phase
        phase: ${voice_assist_thinking_phase_id}
    - script.execute: draw_display

  on_stt_end:
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda 'return x;'
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display


  on_tts_start:
    - script.execute:
        id: send_tts_text_event
        tts_text: !lambda 'return x;'
    - script.execute: reset_screensaver
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - script.execute:
        id: set_phase
        phase: ${voice_assist_replying_phase_id}
    - lambda: 'id(playing_internal_sound) = true;'
    - script.execute: draw_display

  on_tts_end:
    - script.execute:
        id: send_tts_uri_event
        tts_uri: !lambda 'return x;'

  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s

    - wait_until:
        condition:
          - and:
              - not:
                  media_player.is_announcing:
              - not:
                  speaker.is_playing:
                    id: box_speaker

    - if:
        condition:
          lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
        else:
          - if:
              condition:
                lambda: |-
                  return id(voice_assistant_phase) == ${voice_assist_replying_phase_id}
                      || id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
              then:
                - script.execute: set_idle_or_mute_phase
                - script.execute: draw_display

  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - script.execute:
              id: set_phase
              phase: ${voice_assist_error_phase_id}
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - script.execute:
                    id: set_phase
                    phase: ${voice_assist_idle_phase_id}
              else:
                - script.execute:
                    id: set_phase
                    phase: ${voice_assist_muted_phase_id}
                - script.execute: draw_display

  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

  on_client_disconnected:
    - script.execute: stop_wake_word
    - script.execute:
        id: set_phase
        phase: ${voice_assist_not_ready_phase_id}
    - script.execute: draw_display

  on_timer_started:
    - script.execute: reset_screensaver
    - script.execute: draw_display

  on_timer_cancelled:
    - component.update: main_display

  on_timer_updated:
    - component.update: main_display

  on_timer_tick:
    - component.update: main_display

  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        condition:
          - media_player.is_announcing:
    - script.execute:
        id: set_phase
        phase: ${voice_assist_timer_finished_phase_id}
    - script.execute: draw_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          const bool idle_phase   = (id(voice_assistant_phase) == ${voice_assist_idle_phase_id});
          const bool not_muted    = !id(mute).state;

          id(check_if_timers_active).execute();
          const bool has_active_timer = id(global_is_timer_active);

          if (!id(init_in_progress) && idle_phase && not_muted && !has_active_timer) {
            id(idle_seconds)++;
            int delay_s = 1;
            if (delay_s <= 0) delay_s = 30;
          } else {
            id(idle_seconds) = 0;
          }

          static uint32_t tick = 0;
          tick++;
          bool needs_redraw = false;

          auto r = random_uint32();
          if (id(page_id) == 0 && id(blink_dir) == 0 && (r % 54) == 0) {
            id(blink_dir) = 1;
            needs_redraw = true;
          }

          if (id(blink_dir) == 1) {
            id(blink_level) += 0.34f;
            needs_redraw = true;
            if (id(blink_level) >= 1.0f) {
              id(blink_level) = 1.0f;
              id(blink_dir) = -1;
              id(blink_hold) = 1;
            }
          } else if (id(blink_dir) == -1) {
            if (id(blink_hold) > 0) {
              id(blink_hold)--;
            } else {
              id(blink_level) -= 0.30f;
              needs_redraw = true;
              if (id(blink_level) <= 0.0f) {
                id(blink_level) = 0.0f;
                id(blink_dir) = 0;
              }
            }
          }

          int mood = id(emotion_id);
          if (mood == 0) {
            if (id(fear) > 0.35f) mood = 4;
            else if (id(happiness) > 0.45f) mood = 2;
            else mood = 1;
          }

          if (!id(touch_active) && (tick % 10) == 0) {
              float dx = (int(random_uint32() % 25) - 12);
              float dy = (int(random_uint32() % 19) - 9);
              if (mood == 3) {
                dx *= 0.25f;
                dy *= 0.15f;
              }
              if (mood == 4) {
                dx *= 0.6f;
                dy = -8.0f;
              }
              if (mood == 2) {
                dy -= 2.0f;
              }
              id(target_eye_x) = dx;
              id(target_eye_y) = dy;
          }

          float prev_eye_x = id(eye_x);
          float prev_eye_y = id(eye_y);
          id(eye_x) += (id(target_eye_x) - id(eye_x)) * 0.26f;
          id(eye_y) += (id(target_eye_y) - id(eye_y)) * 0.26f;
          if (fabsf(id(eye_x) - prev_eye_x) > 0.4f || fabsf(id(eye_y) - prev_eye_y) > 0.4f) {
            needs_redraw = true;
          }
          id(happiness) *= 0.97f;
          id(fear) *= 0.95f;
          id(petting_score) *= 0.90f;

          if (id(stopwatch_running) && (tick % 11) == 0) {
            id(stopwatch_seconds) += 1;
            needs_redraw = true;
          }
          if (id(countdown_running) && (tick % 11) == 0) {
            if (id(countdown_seconds) > 0) {
              id(countdown_seconds) -= 1;
            } else {
              id(countdown_running) = false;
              id(happiness) = 0.8f;
            }
            needs_redraw = true;
          }

          if ((id(page_id) == 0 && (id(happiness) > 0.01f || id(fear) > 0.01f)) || needs_redraw) {
            id(main_display).update();
          }

script:
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |-
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_waiting_for_command_phase_id}:
                              case ${voice_assist_listening_phase_id}:
                                id(main_display).show_page(listening_page);
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(main_display).show_page(thinking_page);
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(main_display).show_page(replying_page);
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(main_display).show_page(error_page);
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(main_display).show_page(muted_page);
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(main_display).show_page(no_ha_page);
                                break;
                              case ${voice_assist_timer_finished_phase_id}:
                                id(main_display).show_page(timer_finished_page);
                                break;
                              default:
                                id(main_display).show_page(idle_page);
                                break;
                            }
                            id(main_display).update();
                      else:
                        - display.page.show: no_ha_page
                        - component.update: main_display
                else:
                  - display.page.show: no_wifi_page
                  - component.update: main_display
          else:
            - display.page.show: initializing_page
            - component.update: main_display

  - id: fetch_first_active_timer
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          if (timers.empty()) return;

          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;

  - id: check_if_timers_active
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
              break;
            }
          }
          id(global_is_timer_active) = output;

  - id: fetch_first_timer
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          if (timers.empty()) return;

          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;

  - id: check_if_timers
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          id(global_is_timer) = !timers.empty();

  - id: draw_timer_timeline
    then:
      - lambda: |-
          // Test

  - id: draw_active_timer_widget
    then:
      - lambda: |-
          // Test

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
#              - not:
#                  speaker.is_playing:
#                    id: box_speaker
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:

  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - script.execute:
                id: set_phase
                phase: ${voice_assist_idle_phase_id}
          else:
            - script.execute:
                id: set_phase
                phase: ${voice_assist_muted_phase_id}

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          id(playing_internal_sound) = true;
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)->play_file(sound_file, true, false);
          }

  - id: reset_screensaver
    then:
      - lambda: |-
          id(idle_seconds) = 0;

  - id: handle_screen_tap
    then:
      - script.execute: reset_screensaver
      - if:
          condition:
            switch.is_on: timer_ringing
          then:
            - switch.turn_off: timer_ringing
          else:
            - if:
                condition:
                  lambda: return id(wake_word_engine_location).current_option() == "On device";
                then:
                  - if:
                      condition:
                        not:
                          voice_assistant.is_running:
                      then:
                        - voice_assistant.start:
                      else:
                        - voice_assistant.stop:
      - display.page.show: idle_page
      - component.update: main_display


  - id: pulse_swipe_left
    mode: restart
    then:
      - binary_sensor.template.publish: { id: swipe_left,  state: ON }
      - delay: 150ms
      - binary_sensor.template.publish: { id: swipe_left,  state: OFF }

  - id: pulse_swipe_right
    mode: restart
    then:
      - binary_sensor.template.publish: { id: swipe_right, state: ON }
      - delay: 150ms
      - binary_sensor.template.publish: { id: swipe_right, state: OFF }

  - id: pulse_swipe_up
    mode: restart
    then:
      - binary_sensor.template.publish: { id: swipe_up,    state: ON }
      - delay: 150ms
      - binary_sensor.template.publish: { id: swipe_up,    state: OFF }

  - id: pulse_swipe_down
    mode: restart
    then:
      - binary_sensor.template.publish: { id: swipe_down,  state: ON }
      - delay: 150ms
      - binary_sensor.template.publish: { id: swipe_down,  state: OFF }

  - id: pulse_touch_input
    then:
      - binary_sensor.template.publish: { id: touch_input, state: ON }
      - delay: 150ms
      - binary_sensor.template.publish: { id: touch_input, state: OFF }

  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            node: ${name}
            uri: !lambda return tts_uri;
  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - homeassistant.event:
          event: esphome.stt_text
          data:
            node: ${name}
            text: !lambda return stt_text;
  - id: send_tts_text_event
    parameters:
      tts_text: string
    then:
      - homeassistant.event:
          event: esphome.tts_text
          data:
            node: ${name}
            text: !lambda return tts_text;

  - id: set_phase
    parameters:
      phase: int
    then:
      - lambda: id(voice_assistant_phase) = phase;
      - text_sensor.template.publish:
          id: voice_assistant_phase_sensor
          state: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%d", phase);
            return std::string(buf);
      - homeassistant.event:
          event: esphome.phase_id
          data:
